<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f0c13" />
      <stop offset="100%" stop-color="#050505" />
    </linearGradient>
    <linearGradient id="text-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" />
      <stop offset="50%" stop-color="#f0e6f5" />
      <stop offset="100%" stop-color="#b8a9c9" />
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ec4899" />
      <stop offset="100%" stop-color="#8b5cf6" />
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="25" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    <filter id="subtle-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400&amp;display=swap');
      .logo-text {
        font-family: 'Cormorant Garamond', Georgia, serif;
        font-size: 280px;
        font-weight: 400;
        fill: url(#text-grad);
        text-anchor: middle;
      }
    </style>
  </defs>
  
  <!-- Background -->
  <rect width="512" height="512" rx="128" fill="url(#bg)" />
  
  <!-- Subtle inner border -->
  <rect x="2" y="2" width="508" height="508" rx="126" fill="none" stroke="rgba(255,255,255,0.05)" stroke-width="2" />
  
  <!-- Ambient Glow behind H -->
  <circle cx="256" cy="256" r="100" fill="url(#accent)" opacity="0.2" filter="url(#glow)" />
  
  <!-- Decorative elegant rings -->
  <circle cx="256" cy="256" r="170" fill="none" stroke="url(#accent)" stroke-width="1" opacity="0.4" />
  <circle cx="256" cy="256" r="155" fill="none" stroke="rgba(255,255,255,0.1)" stroke-width="1" />
  
  <!-- The H (Using Cormorant Garamond) -->
  <text x="256" y="345" class="logo-text" filter="url(#subtle-glow)">H</text>
</svg>
